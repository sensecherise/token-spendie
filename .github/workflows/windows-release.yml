name: Windows Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  id-token: write

env:
  DOTNET_NOLOGO: true

jobs:
  release:
    name: Build, pack, sign, publish
    runs-on: windows-latest
    timeout-minutes: 45
    env:
      # Steps that depend on optional secrets gate on these flags so the
      # workflow ships unsigned + skips WinGet when the secrets aren't set.
      # Add the underlying secrets in repo Settings -> Secrets -> Actions
      # to enable signing + WinGet submission without editing the YAML.
      HAS_SIGNPATH: ${{ secrets.SIGNPATH_API_TOKEN != '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Extract version from tag
        id: ver
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          if ($tag -notmatch '^v(\d+\.\d+\.\d+(?:-[A-Za-z0-9.]+)?)$') {
            Write-Error "Tag '$tag' does not match v<semver>"
            exit 1
          }
          $version = $Matches[1]
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Version: $version"

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/*.props', '.config/dotnet-tools.json') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore tools
        run: dotnet tool restore

      - name: Restore solution
        run: dotnet restore windows/TokenSpendie.Windows.sln

      - name: Build (Release)
        run: >
          dotnet build windows/TokenSpendie.Windows.sln -c Release --no-restore
          -p:Version=${{ steps.ver.outputs.version }}

      - name: Test (Release)
        run: dotnet test windows/TokenSpendie.Windows.sln -c Release --no-build

      - name: Publish self-contained win-x64
        run: >
          dotnet publish windows/src/TokenSpendie.Windows/TokenSpendie.Windows.csproj
          -c Release -r win-x64 --self-contained true
          -p:Version=${{ steps.ver.outputs.version }}
          -p:PublishSingleFile=false
          -o windows/src/TokenSpendie.Windows/bin/Release/net8.0-windows10.0.17763/publish

      - name: Render release notes
        id: notes
        shell: pwsh
        run: |
          $version = "${{ steps.ver.outputs.version }}"
          $template = Get-Content windows/build/velopack/releasenotes-template.md -Raw
          $notes = $template.Replace("{version}", $version)
          $notesPath = "windows/build/velopack/releasenotes-rendered.md"
          $notes | Out-File -FilePath $notesPath -Encoding utf8
          "path=$notesPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Velopack pack (unsigned, pre-signing)
        run: >
          dotnet tool run vpk -- pack
          --packId "TokenSpendie.Windows"
          --packTitle "Token Spendie"
          --packAuthors "nong.seng"
          --packVersion ${{ steps.ver.outputs.version }}
          --packDir windows/src/TokenSpendie.Windows/bin/Release/net8.0-windows10.0.17763/publish
          --mainExe "TokenSpendie.Windows.exe"
          --icon "windows/build/icon/AppIcon.ico"
          --releaseNotes "${{ steps.notes.outputs.path }}"
          --outputDir windows/releases

      - name: Zip unsigned artifacts for SignPath
        if: env.HAS_SIGNPATH == 'true'
        shell: pwsh
        run: |
          Compress-Archive -Path windows/releases/* -DestinationPath windows/releases-bundle.zip

      - name: Upload unsigned bundle as artifact (SignPath input)
        if: env.HAS_SIGNPATH == 'true'
        id: upload-unsigned
        uses: actions/upload-artifact@v4
        with:
          name: velopack-unsigned-${{ steps.ver.outputs.version }}
          path: windows/releases-bundle.zip
          retention-days: 7

      - name: Submit signing request to SignPath
        if: env.HAS_SIGNPATH == 'true'
        id: signpath
        uses: signpath/github-action-submit-signing-request@v1.1
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ secrets.SIGNPATH_ORG_ID }}
          project-slug: ${{ secrets.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ secrets.SIGNPATH_POLICY_SLUG }}
          artifact-configuration-slug: "release-zip"
          github-artifact-id: ${{ steps.upload-unsigned.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: windows/releases-signed

      - name: Unzip signed bundle back into releases/
        if: env.HAS_SIGNPATH == 'true'
        shell: pwsh
        run: |
          Remove-Item -Recurse -Force windows/releases
          Expand-Archive -Path windows/releases-signed/releases-bundle.zip -DestinationPath windows/releases

      - name: Verify signature on installer
        if: env.HAS_SIGNPATH == 'true'
        shell: pwsh
        run: |
          $installer = Get-ChildItem windows/releases -Filter "*Setup*.exe" | Select-Object -First 1
          if (-not $installer) { Write-Error "No installer found in windows/releases"; exit 1 }
          $sig = Get-AuthenticodeSignature $installer.FullName
          Write-Host "Signature status: $($sig.Status)"
          Write-Host "Signer: $($sig.SignerCertificate.Subject)"
          if ($sig.Status -ne "Valid") {
            Write-Error "Installer signature is not Valid: $($sig.Status)"
            exit 1
          }

      - name: Velopack upload to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >
          dotnet tool run vpk -- upload github
          --repoUrl "https://github.com/sensecherise/token-spendie"
          --publish
          --releaseName "Token Spendie ${{ steps.ver.outputs.version }}"
          --tag ${{ github.ref_name }}
          --token ${{ secrets.GITHUB_TOKEN }}
          --outputDir windows/releases

      - name: Upload signed artifacts to workflow run (for audit)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: velopack-signed-${{ steps.ver.outputs.version }}
          path: windows/releases/
          retention-days: 30

  submit-winget:
    name: Submit to WinGet (stable tags only)
    needs: release
    runs-on: windows-latest
    timeout-minutes: 20
    # Only submit stable releases. Any tag containing "-" (e.g. v1.0.0-rc1,
    # v1.0.0-beta) is treated as a prerelease and skipped. Matches the
    # behaviour of Velopack's GithubSource(prerelease: false) — we only
    # advertise non-prerelease builds via WinGet.
    if: success() && !contains(github.ref_name, '-')
    env:
      # When WINGET_PAT is not configured the per-step gates below skip the
      # submission cleanly so the workflow doesn't fail closed.
      HAS_WINGET: ${{ secrets.WINGET_PAT != '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Extract version from tag
        id: ver
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          if ($tag -notmatch '^v(\d+\.\d+\.\d+)$') {
            Write-Error "Stable tag '$tag' does not match v<major.minor.patch>"
            exit 1
          }
          $version = $Matches[1]
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Stable version: $version"

      - name: Compute installer URL
        id: url
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $url = "https://github.com/sensecherise/token-spendie/releases/download/$tag/TokenSpendie.Windows-win-Setup.exe"
          Write-Host "Installer URL: $url"
          try {
            $resp = Invoke-WebRequest -Uri $url -Method Head -MaximumRedirection 5 -ErrorAction Stop
            Write-Host "HEAD status: $($resp.StatusCode)"
          } catch {
            Write-Error "Installer URL not reachable: $url"
            Write-Error $_.Exception.Message
            exit 1
          }
          "url=$url" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Download wingetcreate (pinned version)
        id: wc
        shell: pwsh
        run: |
          $wcVersion = "v1.12.8.0"
          $wcUrl = "https://github.com/microsoft/winget-create/releases/download/$wcVersion/wingetcreate.exe"
          $wcPath = Join-Path $env:RUNNER_TEMP "wingetcreate.exe"
          Invoke-WebRequest -Uri $wcUrl -OutFile $wcPath
          "path=$wcPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Check whether package already exists in winget-pkgs
        id: exists
        shell: pwsh
        run: |
          $wc = "${{ steps.wc.outputs.path }}"
          & $wc show sensecherise.TokenSpendie 2>&1 | Out-Null
          if ($LASTEXITCODE -eq 0) {
            Write-Host "Package found — will run 'wingetcreate update'."
            "mode=update" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          } else {
            Write-Host "Package not found — will run 'wingetcreate submit' from template."
            "mode=new" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          }

      - name: Submit to WinGet (update existing package)
        if: steps.exists.outputs.mode == 'update' && env.HAS_WINGET == 'true'
        shell: pwsh
        run: |
          $wc = "${{ steps.wc.outputs.path }}"
          & $wc update sensecherise.TokenSpendie `
            --version ${{ steps.ver.outputs.version }} `
            --urls "${{ steps.url.outputs.url }}" `
            --submit `
            --token "${{ secrets.WINGET_PAT }}"
          if ($LASTEXITCODE -ne 0) {
            Write-Error "wingetcreate update failed with exit code $LASTEXITCODE"
            exit $LASTEXITCODE
          }

      - name: Submit to WinGet (new package — first stable release only)
        if: steps.exists.outputs.mode == 'new' && env.HAS_WINGET == 'true'
        shell: pwsh
        run: |
          $wc = "${{ steps.wc.outputs.path }}"
          $stage = Join-Path $env:RUNNER_TEMP "winget-stage\manifests\s\sensecherise\TokenSpendie\${{ steps.ver.outputs.version }}"
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          # Copy templates and substitute placeholder fields with real values.
          Get-ChildItem windows/winget/template -Filter "*.yaml" | ForEach-Object {
            $content = Get-Content $_.FullName -Raw
            $content = $content -replace 'PackageVersion: 0\.0\.0', "PackageVersion: ${{ steps.ver.outputs.version }}"
            $content = $content -replace 'ReleaseDate: 2026-05-28', "ReleaseDate: $(Get-Date -Format 'yyyy-MM-dd')"
            $content = $content -replace 'InstallerUrl: https://example\.invalid/placeholder\.exe', "InstallerUrl: ${{ steps.url.outputs.url }}"
            Set-Content -Path (Join-Path $stage $_.Name) -Value $content
          }
          # Compute SHA256 of the signed installer and patch into the staged installer manifest.
          $installerPath = Join-Path $env:RUNNER_TEMP "installer.exe"
          Invoke-WebRequest -Uri "${{ steps.url.outputs.url }}" -OutFile $installerPath
          $sha = (Get-FileHash $installerPath -Algorithm SHA256).Hash
          $installerYaml = Join-Path $stage "sensecherise.TokenSpendie.installer.yaml"
          (Get-Content $installerYaml -Raw) -replace 'InstallerSha256: 0{64}', "InstallerSha256: $sha" |
            Set-Content -Path $installerYaml
          & $wc submit $stage `
            --token "${{ secrets.WINGET_PAT }}"
          if ($LASTEXITCODE -ne 0) {
            Write-Error "wingetcreate submit (new) failed with exit code $LASTEXITCODE"
            exit $LASTEXITCODE
          }

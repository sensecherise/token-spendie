name: CI Pipeline - Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build:
    runs-on: macos-15
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app

      - name: Build app bundle
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          VERSION="$VERSION" bash build.sh

      - name: Package zip
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cd build
          zip -r --symlinks "TokenSpendie-$VERSION.zip" TokenSpendie.app
          shasum -a 256 "TokenSpendie-$VERSION.zip" | awk '{print $1}' > "TokenSpendie-$VERSION.zip.sha256"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/TokenSpendie-*.zip
            build/TokenSpendie-*.zip.sha256
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Homebrew cask
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          SHA=$(cat "build/TokenSpendie-$VERSION.zip.sha256")
          git clone "https://x-access-token:${TAP_TOKEN}@github.com/sensecherise/homebrew-tap.git" tap
          cd tap
          sed -i '' -E "s/^  version \".*\"/  version \"$VERSION\"/" Casks/token-spendie.rb
          sed -i '' -E "s/^  sha256 \".*\"/  sha256 \"$SHA\"/" Casks/token-spendie.rb
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/token-spendie.rb
          git commit -m "token-spendie $VERSION"
          git push
